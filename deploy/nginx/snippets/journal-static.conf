# ============================================================================
# Общий источник истины: раздача статики фронтенда KOTOKOD.
# ----------------------------------------------------------------------------
# Включается ВНУТРИ server-блока (`include …/journal-static.conf;`) и опирается на
# переменную `$app_root`, заданную включающим сервером:
#
#     set $app_root /opt/kotokod/journal-backend/journal_django;   # прод
#     set $app_root C:/Users/ilyap/TestKOTOKOD/journal_django;     # локально
#
# Используется обоими окружениями (один файл — одни маршруты):
#   - прод:    deploy/nginx/journal-kotokod.conf  (TLS + unix-сокет gunicorn + rate-limit)
#   - локально: deploy/nginx/local/nginx.conf      (plain HTTP :8080 + TCP runserver)
# Раньше эти маршруты дублировались в journal_django/config/urls_dev.py (удалён).
#
# ⚠️ ВНУТРИ этих location НЕ добавлять add_header — иначе server-уровневые
#    security-заголовки молча исчезнут в этом location (правило наследования nginx).
# ============================================================================

# --- Не отдавать sourcemap наружу (Vite собирает admin с sourcemap) и dotfiles ---
location ~ \.map$ { deny all; }
location ~ /\.    { deny all; }

# --- Страница входа: / и /login → frontend/login/index.html (vanilla, не SPA) ---
location = / {
    root $app_root/frontend/login;
    try_files /index.html =404;
}
location = /login {
    root $app_root/frontend/login;
    try_files /index.html =404;
}

# --- Установка пароля по invite: /login/set-password?token=… (путь без расширения).
#     Явный точный location ДО префиксного /login/, иначе try_files ищет файл
#     'set-password' (его нет) → 404. urls_dev.py спецкейсил это; здесь — то же. ---
location = /login/set-password {
    root $app_root/frontend/login;
    try_files /set-password.html =404;
}

# --- Прочие активы login: /login/* → frontend/login (без SPA-fallback) ---
location /login/ {
    alias $app_root/frontend/login/;
    try_files $uri $uri/ =404;
}

# --- Teacher SPA: /teacher и /teacher/* → frontend/teacher (history-fallback) ---
location = /teacher {
    root $app_root/frontend/teacher;
    try_files /index.html =404;
}
location /teacher/ {
    alias $app_root/frontend/teacher/;
    try_files $uri $uri/ /teacher/index.html;
}

# --- Admin SPA: /admin и /admin/* → frontend/admin-dist (history-fallback) ---
location = /admin {
    root $app_root/frontend/admin-dist;
    try_files /index.html =404;
}
location /admin/ {
    alias $app_root/frontend/admin-dist/;
    # Fallback-URI /admin/index.html переразрешается через ЭТОТ же alias-блок
    # → $app_root/frontend/admin-dist/index.html (файл есть → отдаётся, без цикла).
    try_files $uri $uri/ /admin/index.html;
}

# --- Корневые шрифты: /fonts/* → frontend/fonts (нужны teacher/login) ---
location /fonts/ {
    alias $app_root/frontend/fonts/;
    try_files $uri =404;
}
