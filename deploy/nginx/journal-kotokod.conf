# ============================================================================
# nginx site config — KOTOKOD journal (Django cutover, раздел 08)
# ----------------------------------------------------------------------------
# Зеркалит server.js: маршрутизация API + раздача SPA-статики + security-заголовки
# (helmet-эквивалент) + rate-limit. Все /api/* проксируются на Django (gunicorn).
#
# Установка (Beget VPS, Ubuntu 22.04):
#   sudo cp deploy/nginx/journal-kotokod.conf /etc/nginx/sites-available/journal-kotokod
#   sudo ln -s /etc/nginx/sites-available/journal-kotokod /etc/nginx/sites-enabled/
#   sudo nginx -t && sudo systemctl reload nginx
#
# Перед применением заменить:
#   - server_name        → реальный домен
#   - set $app_root      → путь к journal_django/ на VPS (где лежит frontend/)
#   - ssl_certificate*   → пути к сертификатам (Let's Encrypt / Beget)
# ============================================================================

# --- rate-limit зоны (объявить в http-контексте; вынести в /etc/nginx/conf.d/ ) ---
# Общий потолок на весь /api (server.js: apiLimiter 300 запросов/мин).
limit_req_zone $binary_remote_addr zone=api_general:10m rate=300r/m;
# Коарс-защита /api/auth/login от brute-force. Точный лимит 10/15мин остаётся
# в приложении (apps/auth_app/views.py) + lockout аккаунта (5 fails → +15мин в БД).
# Здесь — анти-DoS барьер на уровне прокси (defense-in-depth).
limit_req_zone $binary_remote_addr zone=api_login:10m rate=20r/m;
# /csp-report — публичный неаутентифицированный write-в-лог эндпоинт; лимитируем,
# чтобы curl-флудом нельзя было распухнуть csp-violations.log / нагрузить CPU.
limit_req_zone $binary_remote_addr zone=api_csp:5m rate=30r/m;

# --- CSP violation reporting (http-контекст) ---
# Браузер шлёт отчёты о нарушениях CSP POST'ом на report-uri (/csp-report).
# Чтобы записать ТЕЛО отчёта (JSON с blocked-uri/violated-directive) в отдельный
# лог, запрос надо прогнать через proxy_pass — только тогда nginx буферизует тело
# и заполняет $request_body (для `return 204` тело не читается и $request_body пуст).
# Поэтому /csp-report проксируется на локальный no-op сервер-«сток» ниже, а тело
# пишется в выделенный csp-violations.log. Так отчёты не уходят в Django (нулевой
# код в приложении) и собираются в один файл, который выкачивается с прода.
# $request_body в кавычках: escape=json экранирует его как JSON-строку, поэтому
# строка лога — валидный JSON, а сам отчёт достаётся `jq '.report | fromjson'`.
log_format csp_report escape=json
    '{"time":"$time_iso8601","ip":"$remote_addr","ref":"$http_referer","ua":"$http_user_agent","report":"$request_body"}';

# No-op сервер-сток на loopback: принимает проксированный отчёт и сразу 204.
server {
    listen 127.0.0.1:19876;
    server_name _;
    access_log off;
    location / { return 204; }
}

# --- upstream: Django через gunicorn (unix-сокет) ---
upstream journal_django {
    server unix:/run/journal-django/gunicorn.sock fail_timeout=0;
}

# --- HTTP → HTTPS редирект ---
server {
    listen 80;
    server_name example.kotokod.ru;          # ЗАМЕНИТЬ на домен
    # ACME-challenge для Let's Encrypt обслуживать до редиректа при необходимости
    location / { return 301 https://$host$request_uri; }
}

server {
    listen 443 ssl;
    http2 on;
    server_name example.kotokod.ru;           # ЗАМЕНИТЬ на домен

    # Путь к journal_django/ на VPS (где frontend/login, frontend/teacher,
    # frontend/admin-dist, frontend/fonts). Раньше указывал на корень репо с public/.
    set $app_root /opt/kotokod/journal-backend/journal_django;   # ЗАМЕНИТЬ при необходимости

    ssl_certificate     /etc/letsencrypt/live/example.kotokod.ru/fullchain.pem;  # ЗАМЕНИТЬ
    ssl_certificate_key /etc/letsencrypt/live/example.kotokod.ru/privkey.pem;    # ЗАМЕНИТЬ
    ssl_protocols TLSv1.2 TLSv1.3;
    ssl_prefer_server_ciphers off;

    # Тело запроса: record_url и пр. небольшие; держим скромный лимит.
    client_max_body_size 2m;

    server_tokens off;                    # не светить версию nginx (helmet убирал X-Powered-By)

    # ===== Security-заголовки (helmet-эквивалент, server.js: helmet({csp:false})) =====
    # ⚠️ Эти add_header объявлены на server-уровне и наследуются во все location ТОЛЬКО
    #    пока ни один location не объявляет СВОЙ add_header (правило nginx). Не добавлять
    #    add_header внутрь location — иначе server-уровневые молча исчезнут в нём.
    #
    # HSTS: единый источник — nginx (раньше эмитил Django, но Django отвечает только на
    # /api, а сами HTML-страницы (/, /teacher, /admin) отдаёт nginx → на первой навигации
    # HSTS не было и preload-submission бы не прошёл). Теперь заголовок на server-уровне
    # покрывает И статику, И проксируемые /api. В production.py SECURE_HSTS_* убраны, чтобы
    # не было дубля заголовка на /api-ответах.
    add_header Strict-Transport-Security "max-age=31536000; includeSubDomains; preload" always;
    add_header X-Content-Type-Options    "nosniff"        always;
    add_header X-Frame-Options           "SAMEORIGIN"     always;
    add_header Referrer-Policy           "no-referrer"    always;
    add_header X-XSS-Protection          "0"              always;
    add_header X-Permitted-Cross-Domain-Policies "none"   always;
    # helmet по умолчанию также ставит cross-origin-изоляцию — зеркалим:
    add_header Cross-Origin-Opener-Policy   "same-origin" always;
    add_header Cross-Origin-Resource-Policy "same-origin" always;
    add_header Origin-Agent-Cluster         "?1"          always;
    # Permissions-Policy: отключаем неиспользуемые возможности браузера (если на страницу
    # пролезет чужой скрипт — камера/гео/микрофон ему уже запрещены). helmet по умолчанию
    # этот заголовок не ставил, поэтому его не было. Пустой allowlist () = запрещено всем.
    add_header Permissions-Policy "geolocation=(), microphone=(), camera=(), payment=(), usb=(), magnetometer=(), gyroscope=(), accelerometer=()" always;

    # ===== Content-Security-Policy (defense-in-depth против XSS) =====
    # ФАЗА ВЫКАТКИ: Report-Only — браузер ЛОГИРУЕТ нарушения (консоль + report-uri),
    # но НИЧЕГО не блокирует. После прогона всех трёх фронтов и нуля нарушений
    # переключить заголовок на боевой `Content-Security-Policy` (значение то же,
    # минус — оставить, или убрать report-uri). НЕ включать боевой до браузерной
    # верификации. Значение ИДЕНТИЧНО локальному конфигу (dev/prod parity).
    #   script-src 'self'              — после выноса inline-скриптов teacher SPA в app.js;
    #   style-src ... 'unsafe-inline'  — прагматичный компромисс (inline-стили React/teacher);
    #   font-src 'self'                — шрифты self-hosted (Steppe + Manrope/Inter/JetBrains в /fonts, /admin/fonts);
    #   connect-src 'self'             — все fetch идут на относительные /api (same-origin);
    #   frame-ancestors 'none'         — усиливает X-Frame-Options;
    #   report-uri /csp-report         — отчёты в выделенный csp-violations.log (см. ниже).
    add_header Reporting-Endpoints 'csp-endpoint="/csp-report"' always;
    add_header Content-Security-Policy-Report-Only "default-src 'self'; script-src 'self'; style-src 'self' 'unsafe-inline'; img-src 'self' data:; font-src 'self'; connect-src 'self'; frame-ancestors 'none'; base-uri 'self'; form-action 'self'; object-src 'none'; upgrade-insecure-requests; report-uri /csp-report; report-to csp-endpoint" always;
    
    # Запрет доступа к dotfiles (.env, .git и т.п.), если случайно попадут в public/.
    location ~ /\. { deny all; }

    # gzip для текстовых ответов API/SPA
    gzip on;
    gzip_types application/json application/javascript text/css text/plain image/svg+xml;
    gzip_min_length 512;

    # ========================================================================
    # API → Django (gunicorn)
    # ------------------------------------------------------------------------
    # nginx выбирает location по самому длинному совпадению префикса, поэтому
    # /api/auth и /api/admin перехватываются ДО общего /api автоматически —
    # порядок блоков не важен (в отличие от Express, где порядок mount критичен;
    # сам инвариант порядка теперь живёт в Django config/urls.py:
    #   api/auth → api/admin/* → api (teacher)).
    # ========================================================================

    # Строгий лимит на login (коарс анти-brute-force; точный — в приложении).
    location = /api/auth/login {
        limit_req zone=api_login burst=10 nodelay;
        limit_req_status 429;
        proxy_pass http://journal_django;
        include /etc/nginx/proxy_params;
        proxy_set_header X-Forwarded-Proto $scheme;
        # ПЕРЕЗАПИСЫВАЕМ XFF реальным peer-IP (не append). Приложение берёт
        # xff.split(',')[0] для rate-limit/audit — иначе клиент мог бы подделать IP
        # заголовком X-Forwarded-For и обойти лимитер / отравить журнал.
        proxy_set_header X-Forwarded-For $remote_addr;
        proxy_set_header X-Real-IP $remote_addr;
    }

    # CSP violation reports: браузер POST'ит сюда (report-uri). Проксируем на
    # no-op сток (loopback :19876), чтобы nginx прочитал тело и записал его в
    # выделенный csp-violations.log. В Django НЕ уходит. Без add_header внутри —
    # иначе server-уровневые security-заголовки исчезнут в этом location.
    location = /csp-report {
        limit_req zone=api_csp burst=10 nodelay;
        limit_req_status 429;
        access_log /var/log/nginx/csp-violations.log csp_report;
        proxy_pass http://127.0.0.1:19876;
        proxy_set_header Host $host;
        # буфер = max: любой принимаемый отчёт буферизуется в памяти и гарантированно
        # попадёт в лог ($request_body не уедет во временный файл → не будет пустым).
        client_body_buffer_size 64k;
        client_max_body_size 64k;
    }

    # Весь остальной /api/* (auth, admin, teacher) → Django.
    location /api/ {
        limit_req zone=api_general burst=60 nodelay;
        limit_req_status 429;
        proxy_pass http://journal_django;
        include /etc/nginx/proxy_params;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header X-Forwarded-For $remote_addr;   # см. комментарий выше
        proxy_set_header X-Real-IP $remote_addr;
    }

    # ========================================================================
    # Статика SPA (раздаёт nginx напрямую из frontend/)
    # ------------------------------------------------------------------------
    # Маршруты вынесены в общий сниппет — единый источник истины с локальным
    # конфигом (deploy/nginx/local/nginx.conf). Опирается на `$app_root` выше.
    # Установка: скопировать сниппет в /etc/nginx/snippets/journal-static.conf
    # (include резолвится относительно /etc/nginx/). См. deploy/README.md.
    # ⚠️ Внутри location сниппета НЕ добавлять add_header — иначе server-уровневые
    #    security-заголовки (строки выше) молча исчезнут в этом location.
    include snippets/journal-static.conf;
}
