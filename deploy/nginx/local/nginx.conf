# ============================================================================
# Локальный nginx-конфиг (Windows, БЕЗ Docker) — запуск платформы как в проде.
# ----------------------------------------------------------------------------
# Реверс-прокси перед Django: nginx раздаёт статику фронта напрямую и проксирует
# /api/* и /health на `manage.py runserver :8000`. Логику раздачи статики берёт
# из общего сниппета (deploy/nginx/snippets/journal-static.conf) — тот же файл,
# что использует прод-конфиг. Это убирает дублирование, которое раньше жило в
# journal_django/config/urls_dev.py.
#
# Запуск: deploy/nginx/local/start-local-nginx.ps1  (или вручную, см. README).
#   nginx -p "<каталог-установки-nginx>" -c "<repo>/deploy/nginx/local/nginx.conf"
# -p даёт nginx служебные пути (logs/, temp/); сам конфиг их не хардкодит.
#
# ⚠️ Перед запуском проверить `set $app_root` ниже — путь к journal_django/ на
#    вашей машине (форвард-слеши даже на Windows).
# ============================================================================

worker_processes 1;

events {
    worker_connections 256;
}

http {
    # MIME-типы заданы инлайн (не зависим от conf/mime.types установки nginx).
    # woff2/js/css критичны: без верного типа X-Content-Type-Options: nosniff
    # заставит браузер отклонить шрифт/скрипт/стиль.
    default_type application/octet-stream;
    types {
        text/html               html;
        application/javascript  js mjs;
        text/css                css;
        font/woff2              woff2;
        font/woff               woff;
        image/svg+xml           svg;
        application/json        json map webmanifest;
        image/png               png;
        image/jpeg              jpg jpeg;
        image/x-icon            ico;
        image/gif               gif;
    }

    sendfile on;
    server_tokens off;

    # Django (runserver) — обычный TCP-порт (gunicorn POSIX-only, локально не идёт).
    upstream journal_django {
        server 127.0.0.1:8000;
    }

    # --- CSP violation reporting (зеркало прод-конфига) ---
    # Браузер POST'ит отчёты о нарушениях CSP на /csp-report. Чтобы записать ТЕЛО
    # отчёта в отдельный лог, запрос проксируется на no-op сервер-«сток» ниже —
    # только при proxy_pass nginx буферизует тело и заполняет $request_body.
    # $request_body в кавычках → строка лога валидный JSON; отчёт: jq '.report|fromjson'.
    log_format csp_report escape=json
        '{"time":"$time_iso8601","ip":"$remote_addr","ref":"$http_referer","ua":"$http_user_agent","report":"$request_body"}';

    # No-op сток на loopback: принимает проксированный отчёт и сразу 204.
    server {
        listen 127.0.0.1:19876;
        server_name _;
        access_log off;
        location / { return 204; }
    }

    server {
        listen 8080;
        server_name localhost;

        # >>> ПУТЬ К journal_django/ НА ВАШЕЙ МАШИНЕ (форвард-слеши) <<<
        set $app_root C:/Users/ilyap/TestKOTOKOD/journal_django;

        client_max_body_size 2m;

        # Security-заголовки на server-уровне — зеркало прод-конфига (helmet-эквивалент).
        # ⚠️ Не дублировать add_header внутри location (затрёт эти).
        # HSTS здесь НЕТ намеренно: локаль работает по http :8080, а Strict-Transport-Security
        # браузер на http игнорирует (и применять его к localhost было бы вредно). В проде HSTS
        # ставится — см. deploy/nginx/journal-kotokod.conf.
        add_header X-Content-Type-Options    "nosniff"        always;
        add_header X-Frame-Options           "SAMEORIGIN"     always;
        add_header Referrer-Policy           "no-referrer"    always;
        add_header X-XSS-Protection          "0"              always;
        # Зеркалим прод-конфиг (раньше этих 4 заголовков локально не было → рассинхрон):
        add_header X-Permitted-Cross-Domain-Policies "none"   always;
        add_header Cross-Origin-Opener-Policy   "same-origin" always;
        add_header Cross-Origin-Resource-Policy "same-origin" always;
        add_header Origin-Agent-Cluster         "?1"          always;
        add_header Permissions-Policy "geolocation=(), microphone=(), camera=(), payment=(), usb=(), magnetometer=(), gyroscope=(), accelerometer=()" always;
        # DEV-ONLY: не кэшировать в браузере — иначе после правок фронта браузер
        # отдаёт старый login.js/set-password.js (новые кнопки + старый JS = «клик не
        # работает»). Наследуется в static-локейшены сниппета (у них нет своего add_header).
        # В проде этого НЕТ — там ассеты кэшируются.
        add_header Cache-Control "no-store" always;
        # Reporting API: объявляем группу "csp-endpoint" → наш /csp-report.
        # Новые браузеры используют её через директиву report-to (см. CSP ниже);
        # старые откатятся на report-uri. Приёмник (/csp-report) один и тот же.
        add_header Reporting-Endpoints 'csp-endpoint="/csp-report"' always;
        # Content-Security-Policy — Report-Only (браузер логирует, не блокирует).
        # Значение ИДЕНТИЧНО прод-конфигу (dev/prod parity). Прогон фронтов идёт
        # именно здесь: открыть login/teacher/admin, собрать нарушения из консоли
        # и csp-violations.log, добить политику до нуля, затем переключить ОБА
        # конфига на боевой `Content-Security-Policy`. Наследуется в snippet-локейшены.
        add_header Content-Security-Policy-Report-Only "default-src 'self'; script-src 'self'; style-src 'self' 'unsafe-inline'; img-src 'self' data:; font-src 'self'; connect-src 'self'; frame-ancestors 'none'; base-uri 'self'; form-action 'self'; object-src 'none'; upgrade-insecure-requests; report-uri /csp-report; report-to csp-endpoint" always;

        # --- CSP violation reports → no-op сток, тело в выделенный лог ---
        # Лог-путь относительный → резолвится под nginx-префиксом (-p), рядом с
        # access/error логами. Без add_header внутри (наследуем server-уровневые).
        # ВНИМАНИЕ: rate-limit здесь НАМЕРЕННО НЕТ (в отличие от прода). Локально
        # это dev для одного человека, а во время Report-Only-прогона лимит глушил
        # бы сами отчёты о нарушениях, которые мы и собираем.
        location = /csp-report {
            access_log logs/csp-violations.log csp_report;
            proxy_pass http://127.0.0.1:19876;
            proxy_set_header Host $host;
            client_body_buffer_size 64k;  # = max → отчёт всегда буферизуется в память
            client_max_body_size 64k;
        }

        # --- API → Django runserver ---
        location /api/ {
            proxy_pass http://journal_django;
            proxy_set_header Host              $host;
            proxy_set_header X-Real-IP         $remote_addr;
            proxy_set_header X-Forwarded-For   $remote_addr;
            proxy_set_header X-Forwarded-Proto $scheme;
        }

        # --- Health-check → Django ---
        location = /health {
            proxy_pass http://journal_django;
            proxy_set_header Host $host;
        }

        # --- Статика фронта (общий источник истины с прод-конфигом) ---
        include C:/Users/ilyap/TestKOTOKOD/deploy/nginx/snippets/journal-static.conf;
    }
}
