# Drop-in для journald — явный лимит на журнал systemd (логи journal-django,
# journal-celery-worker/beat, journal-db-backup и т.п. идут туда через stdout).
#
# Без этого файла journald использует дефолт Ubuntu (~10% ФС, не больше 4G) —
# работает, но лимит неявный и не привязан ко времени. Здесь фиксируем явно:
# не больше 1 ГБ на диске и не хранить старше 180 дней.
#
# Установка:
#   sudo cp deploy/systemd/journald-kotokod.conf /etc/systemd/journald.conf.d/10-kotokod.conf
#   sudo systemctl restart systemd-journald

[Journal]
SystemMaxUse=1G
MaxRetentionSec=180day
