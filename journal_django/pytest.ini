[pytest]
# Тесты ВСЕГДА идут в изолированную journal_test (config/settings/test.py содержит
# fail-fast guard против боевой БД). НЕ менять на development — это вернёт ловушку
# «pytest стирает боевую journal». Пересоздать схему: scripts/recreate_test_db.sh
DJANGO_SETTINGS_MODULE = config.settings.test
python_files = test_*.py
python_classes = Test*
python_functions = test_*
# Discover tests in apps/ directory
testpaths = apps
addopts = -v --tb=short
